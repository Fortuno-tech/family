<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fianakaviana - 2026</title> 
    
    <!-- Bibliothèques externes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Lien vers ton fichier CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen">

    <!-- NAVIGATION -->
    <nav class="sticky top-0 z-50 text-white p-3 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="flex items-center gap-2 font-bold text-lg">
                <i data-lucide="wallet" class="w-5 h-5"></i> 
                <span>Fikambanana 2026</span>
            </h1>
            <div class="flex gap-2 items-center">
                <button onclick="switchTab('public')" class="text-xs px-2 py-1 bg-white/10 rounded">Dash</button>
                <button onclick="checkAdminAccess()" class="bg-indigo-800 px-3 py-1.5 rounded-lg flex items-center gap-1 border border-indigo-400 text-[10px]">
                    <i data-lucide="lock" class="w-3"></i> Admin
                </button>
                <button onclick="toggleTheme()" class="p-2 bg-white/10 rounded-full">
                    <i data-lucide="sun" id="themeIcon" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-3 space-y-6">
        <!-- SECTION 1 : DASHBOARD PUBLIC -->
        <div id="public" class="tab-content active space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <div class="stat-card bg-white p-4 rounded-xl shadow-sm">
                    <p class="text-slate-500 text-[9px] uppercase font-bold">Voangona</p>
                    <h2 id="totalCollected" class="text-xl font-black text-indigo-600">0 Ar</h2>
                </div>
                <div class="stat-card bg-white p-4 rounded-xl shadow-sm">
                    <p class="text-slate-500 text-[9px] uppercase font-bold">Fandrosoana</p>
                    <h2 id="participationRate" class="text-xl font-black text-emerald-500">0%</h2>
                </div>
                <div class="stat-card bg-white p-4 rounded-xl shadow-sm">
                    <p class="text-slate-500 text-[9px] uppercase font-bold">Andrasana</p>
                    <h2 id="remainingAmount" class="text-xl font-black text-rose-500">0 Ar</h2>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-3 border-b bg-slate-50 flex justify-between items-center">
                    <h3 class="font-bold text-slate-700 text-xs">Fanaraha-maso</h3>
                    <div class="flex gap-2 text-[9px]">
                        <span class="flex items-center gap-1"><span class="w-2 h-2 bg-emerald-500 rounded-full"></span> Vita</span>
                        <span class="flex items-center gap-1"><span class="w-2 h-2 bg-slate-200 rounded-full"></span> Miandry</span>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-[9px] uppercase text-slate-400 bg-slate-50">
                                <th class="p-3 border-b">Mpikambana</th>
                                <th class="p-1 border-b text-center">J</th><th class="p-1 border-b text-center">F</th>
                                <th class="p-1 border-b text-center">M</th><th class="p-1 border-b text-center">A</th>
                                <th class="p-1 border-b text-center">M</th><th class="p-1 border-b text-center">J</th>
                                <th class="p-1 border-b text-center">J</th><th class="p-1 border-b text-center">A</th>
                                <th class="p-1 border-b text-center">S</th><th class="p-1 border-b text-center">O</th>
                                <th class="p-1 border-b text-center">N</th><th class="p-1 border-b text-center">D</th>
                                <th class="p-3 border-b text-right">Total</th>
                            </tr>
                        </thead>
                        <tbody id="publicTableBody" class="divide-y divide-slate-100 text-xs"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <h3 class="font-bold text-xs text-slate-700 mb-4">Fivoarana</h3>
                <canvas id="paymentChart" style="max-height: 180px;"></canvas>
            </div>
        </div>

        <!-- SECTION 2 : ADMIN PANEL -->
        <div id="admin" class="tab-content space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-bold">Admin Panel</h2>
                <button onclick="switchTab('public')" class="text-[10px] bg-slate-100 px-3 py-1 rounded-full">Hiverina</button>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-md border-t-4 border-indigo-600">
                <div class="flex gap-2">
                    <input type="text" id="adminName" placeholder="Anarana..." class="flex-1 border p-2 rounded-lg text-sm outline-none">
                    <button onclick="saveMember()" class="bg-indigo-600 text-white px-4 rounded-lg"><i data-lucide="plus"></i></button>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <tbody id="adminTableBody" class="divide-y divide-slate-100 text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- FIREBASE INIT -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBCX7dnoKRyOpvjOKValtQsITLOpJTTo-Y",
            authDomain: "family-bee53.firebaseapp.com",
            projectId: "family-bee53",
            storageBucket: "family-bee53.firebasestorage.app",
            messagingSenderId: "268306992258",
            appId: "1:268306992258:web:dfdf5ba71d5dd73306b89b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.fs = { collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, query, orderBy };
    </script>

    <!-- Lien vers ton fichier JS principal -->
    <script src="script.js"></script>
</body>
</html>
